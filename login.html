<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>cinemaverse-Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
    <h2>cinemaverse</h2>
  <ul>
          <li><a href="index.html">Home</a></li>
     <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
      </ul>
     <button class="theme-toggle" onclick="toggleTheme()">Change Theme</button>
    </nav>

    <div class="form-container">
        <h2 style="text-align: center; margin-bottom: 20px;">join to Verse Fam</h2>
    <form onsubmit="validateLogin(event)" novalidate>
    <div class="form-group">
        <label for="email">Email:</label>
       <input type="email" id="email" placeholder="urmail@mail.com">
    <div id="email-error" class="custom-error"></div>
        </div>
            
     <div class="form-group">
         <label for="password">Password:</label>
    <input type="password" id="password" placeholder="*****">
    <div id="pass-error" class="custom-error"></div>
</div>
            
      <button type="submit" style="width: 100%; padding: 10px; background-color: var(--primary-color); color: white; border: none; cursor: pointer;">Login</button>
  </form>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
