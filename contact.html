 <div class="form-container">
     <h2 style="text-align: center; margin-bottom: 20px;">Contact to cinemaverse</h2>
    <form id="contactForm" onsubmit="validateContact(event)">
          <div class="form-group">
                  <label for="subject">Subject:</label>
<input type="text" id="subject" placeholder="Project Feedback / Inquiry" required>
        </div>    
            <div class="form-group">
        <label for="message">Message:</label>
      <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
            </div>
        
            <button type="submit" style="width: 100%; height:80% ; padding: 10px; background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold;">Send Message</button>
        </form>
    </div>
