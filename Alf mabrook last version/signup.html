<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cinemaverse - Sign Up</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
 <h2>cinemaverse</h2>
 <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="login.html">Login</a></li>
   <li><a href="signup.html">sign up</a></li>
</ul>
<button class="theme-toggle" onclick="toggleTheme()">change theme</button>
</nav>
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 20px;">Join to us</h2>
   <form onsubmit="validateSignup(event)">
  <div class="form-group">
  <label for="name">Name:</label>
    <input type="text" id="name" required>
</div>            
    <div class="form-group">
        <label for="reg-email">Email:</label>
        <input type="email" id="reg-email" required>
        </div>
<button type="button" id="codeBtn" onclick="requestCode()" style="width: 100%; padding: 10px; background-color: #444; color: white; border: none; cursor: pointer; margin-bottom: 15px; border-radius: 4px; font-weight: bold;">Get Verification Code</button>
<div id="verification-group" class="form-group" style="display: none;">
    <label for="verify-code">Verification Code:</label>
    <input type="text" id="verify-code" placeholder="Enter 6-digit code">
</div>
<div class="form-group">
    <label for="reg-password">Password:</label>
    <input type="password" id="reg-password" placeholder="6+ characters" required>
</div>            
<button type="submit" style="width: 100%; height: 80%; padding: 10px; background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold;">Sign Up</button>
</form>
</div>
<script src="js/main.js"></script>
</body>
</html>
